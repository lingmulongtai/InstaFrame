name: Web quality checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Main runs use an immutable group so every pushed commit keeps its evidence.
  # Pull requests share their ref and supersede only their own stale revision.
  group: web-quality-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run syntax, lint, and unit tests
        run: |
          npm run check:syntax
          npm run lint
          npm run test:unit

  browser:
    needs: quality
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: chromium
            suite: full
          - target: firefox
            suite: cross-browser
          - target: webkit
            suite: cross-browser
    runs-on: ubuntu-latest
    container:
      # Keep this tag aligned with @playwright/test in package-lock.json.
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
      options: --user 1001

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run browser contract
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BROWSER: ${{ matrix.target }}
          PLAYWRIGHT_SUITE: ${{ matrix.suite }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-${{ matrix.target }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  browser-edge:
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run browser contract
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BROWSER: edge
          PLAYWRIGHT_SUITE: cross-browser

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-edge
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: [quality, browser, browser-edge]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
      queue: max
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Confirm this is still the current main revision
        id: release
        shell: bash
        run: |
          current_sha="$(git ls-remote origin refs/heads/main | cut -f1)"
          if [[ "$current_sha" == "$GITHUB_SHA" ]]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
          else
            echo "current=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping stale Pages deployment for $GITHUB_SHA; main is $current_sha"
          fi

      - name: Setup Node.js
        if: steps.release.outputs.current == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.release.outputs.current == 'true'
        run: npm ci

      - name: Prepare website artifact
        if: steps.release.outputs.current == 'true'
        run: npm run build:site

      - name: Configure Pages
        if: steps.release.outputs.current == 'true'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload Pages artifact
        if: steps.release.outputs.current == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        if: steps.release.outputs.current == 'true'
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
