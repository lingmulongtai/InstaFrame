name: Web quality checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run syntax, lint, and unit tests
        run: |
          npm run check:syntax
          npm run lint
          npm run test:unit

  browser:
    needs: quality
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: chromium
            os: ubuntu-latest
            install: chromium
            suite: full
          - target: firefox
            os: ubuntu-latest
            install: firefox
            suite: cross-browser
          - target: webkit
            os: ubuntu-latest
            install: webkit
            suite: cross-browser
          - target: edge
            os: windows-latest
            install: ''
            suite: cross-browser
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        if: matrix.install != ''
        run: npx playwright install --with-deps ${{ matrix.install }}

      - name: Run browser contract
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BROWSER: ${{ matrix.target }}
          PLAYWRIGHT_SUITE: ${{ matrix.suite }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.target }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
